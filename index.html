<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stazione Meteo Giovanni</title>

<!-- Icona app -->
<link rel="apple-touch-icon" href="icon.png">

<!-- Modalità app a schermo intero -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f2f2f7;
        text-align: center;
        padding-top: 40px;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 20px;
    }

    .card {
        background: white;
        margin: 20px auto;
        padding: 25px;
        width: 80%;
        max-width: 350px;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .value {
        font-size: 40px;
        font-weight: 600;
        margin-top: 10px;
    }

    .label {
        font-size: 18px;
        color: #666;
    }
</style>
</head>

<body>

<h1>Stazione Meteo Giovanni</h1>

<div class="card">
    <div class="label">Temperatura</div>
    <div id="temp" class="value">-- °C</div>
</div>

<div class="card">
    <div class="label">Umidità</div>
    <div id="hum" class="value">-- %</div>
</div>

<div class="card">
    <div class="label">Pressione</div>
    <div id="press" class="value">-- hPa</div>
</div>

<script src="script.js"></script>

</body>
</html>
